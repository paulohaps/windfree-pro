<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WindFree Pro" />
  <title>WindFree Pro</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            app: {
              bg: "#000000",
              panel: "#101114",
              panelSoft: "#17181c",
              accent: "#22d3ee"
            }
          },
          fontFamily: {
            sans: ["Space Grotesk", "system-ui", "sans-serif"],
            mono: ["JetBrains Mono", "monospace"]
          },
          boxShadow: {
            panel: "0 24px 60px rgba(0,0,0,0.35)",
            glow: "0 0 0 1px rgba(34,211,238,0.18), 0 20px 50px rgba(34,211,238,0.1)"
          },
          backgroundImage: {
            shell: "radial-gradient(circle at top left, rgba(34,211,238,0.14), transparent 35%), radial-gradient(circle at bottom right, rgba(59,130,246,0.14), transparent 35%)"
          }
        }
      }
    };
  </script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/framer-motion/dist/framer-motion.js"></script>

  <style>
    html, body, #root { height: 100%; }
    body {
      margin: 0;
      background: #000;
      color: #f8fafc;
      font-family: "Space Grotesk", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior: none;
    }
    * { box-sizing: border-box; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }
  </style>
</head>
<body class="bg-app-bg bg-shell">
  <div id="root"></div>
  <script type="text/babel">
const { useCallback, useEffect, useMemo, useRef, useState } = React;
const motionLib = window.Motion || window["framer-motion"] || { motion: new Proxy({}, { get: () => "div" }), AnimatePresence: ({ children }) => children };
const { motion, AnimatePresence } = motionLib;
const DEFAULT_API_URL = "COLE_AQUI_SUA_URL_DO_WEB_APP";
const NAV_ITEMS = [
  { id: "overview", label: "Visao geral", subtitle: "Telemetria e status" },
  { id: "control", label: "Operacao", subtitle: "Comandos rapidos" },
  { id: "energy", label: "Energia", subtitle: "Custo e historico" },
  { id: "automation", label: "Automacoes", subtitle: "Rotinas e timers" },
  { id: "ai", label: "IA", subtitle: "Otimizacao inteligente" },
  { id: "settings", label: "Configuracoes", subtitle: "Backend e seguranca" }
];
const INITIAL_DEVICE = {
  power: false,
  tempAlvo: 23,
  modo: "cool",
  fanSpeed: "auto",
  fanOscil: "auto",
  economia: false,
  modoOpcional: "--",
  autoClean: "--",
  potencia: 0,
  energia: 0,
  temperatura: 0,
  umidade: null
};
const PRESETS = [
  { id: "eco", label: "Eco noite" },
  { id: "comfort", label: "Conforto" },
  { id: "turbo", label: "Turbo" }
];

function cn(...values) {
  return values.filter(Boolean).join(" ");
}

function formatCurrency(value) {
  return new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" }).format(value || 0);
}

function formatTime(date = new Date()) {
  return date.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
}

function useToast() {
  const [toast, setToast] = useState(null);
  const showToast = useCallback((message, tone = "info") => {
    setToast({ id: Date.now(), message, tone });
  }, []);

  useEffect(() => {
    if (!toast) return undefined;
    const timer = window.setTimeout(() => setToast(null), 2800);
    return () => window.clearTimeout(timer);
  }, [toast]);

  return { toast, showToast };
}

function StatCard({ label, value, hint, accent = false }) {
  return (
    <div className={cn("rounded-3xl border p-4 sm:p-5 shadow-panel", accent ? "border-cyan-400/20 bg-cyan-400/10" : "border-white/10 bg-white/5")}>
      <p className="text-[11px] uppercase tracking-[0.28em] text-slate-400">{label}</p>
      <p className="mt-3 text-2xl font-bold text-white sm:text-3xl">{value}</p>
      {hint ? <p className="mt-2 text-sm text-slate-400">{hint}</p> : null}
    </div>
  );
}

function ActionButton({ children, onClick, variant = "primary", disabled = false, full = false }) {
  const variants = {
    primary: "bg-cyan-400 text-black shadow-glow",
    secondary: "bg-white/8 text-white border border-white/10",
    ghost: "bg-transparent text-slate-300 border border-white/10"
  };

  return (
    <button
      onClick={onClick}
      disabled={disabled}
      className={cn("min-h-[52px] rounded-2xl px-4 text-sm font-semibold transition active:scale-[0.99] disabled:cursor-not-allowed disabled:opacity-50", variants[variant], full && "w-full")}
    >
      {children}
    </button>
  );
}

function RangeTemp({ value, onDecrease, onIncrease }) {
  return (
    <div className="rounded-3xl border border-white/10 bg-white/5 p-5">
      <div className="flex items-center justify-between gap-4">
        <div>
          <p className="text-xs uppercase tracking-[0.24em] text-slate-400">Temperatura alvo</p>
          <p className="mt-3 text-4xl font-bold text-white">{value}°</p>
        </div>
        <div className="flex gap-3">
          <button onClick={onDecrease} className="h-14 w-14 rounded-2xl border border-white/10 bg-white/8 text-2xl text-white">-</button>
          <button onClick={onIncrease} className="h-14 w-14 rounded-2xl bg-cyan-400 text-2xl font-bold text-black shadow-glow">+</button>
        </div>
      </div>
    </div>
  );
}

function ChartCard({ title, subtitle, chartType, chartData, options }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || !chartData) return undefined;
    const context = canvasRef.current.getContext("2d");
    if (chartRef.current) chartRef.current.destroy();

    chartRef.current = new Chart(context, { type: chartType, data: chartData, options });

    return () => {
      if (chartRef.current) {
        chartRef.current.destroy();
        chartRef.current = null;
      }
    };
  }, [chartData, chartType, options]);

  return (
    <div className="rounded-3xl border border-white/10 bg-white/5 p-5 shadow-panel">
      <div className="mb-4">
        <p className="text-lg font-semibold text-white">{title}</p>
        <p className="mt-1 text-sm text-slate-400">{subtitle}</p>
      </div>
      <div className="h-64"><canvas ref={canvasRef}></canvas></div>
    </div>
  );
}

function Modal({ open, title, subtitle, onClose, children }) {
  return (
    <AnimatePresence>
      {open ? (
        <motion.div
          initial={{ opacity: 0 }}
          animate={{ opacity: 1 }}
          exit={{ opacity: 0 }}
          className="fixed inset-0 z-50 flex items-end bg-black/70 p-4 backdrop-blur md:items-center md:justify-center"
          onClick={onClose}
        >
          <motion.div
            initial={{ y: 32, opacity: 0, scale: 0.98 }}
            animate={{ y: 0, opacity: 1, scale: 1 }}
            exit={{ y: 24, opacity: 0 }}
            transition={{ type: "spring", stiffness: 280, damping: 28 }}
            className="w-full max-w-lg rounded-[28px] border border-white/10 bg-[#09090b] p-6 shadow-panel"
            onClick={(event) => event.stopPropagation()}
          >
            <div className="flex items-start justify-between gap-4">
              <div>
                <h3 className="text-xl font-semibold text-white">{title}</h3>
                {subtitle ? <p className="mt-2 text-sm text-slate-400">{subtitle}</p> : null}
              </div>
              <button onClick={onClose} className="h-10 w-10 rounded-2xl border border-white/10 bg-white/5 text-white">x</button>
            </div>
            <div className="mt-5">{children}</div>
          </motion.div>
        </motion.div>
      ) : null}
    </AnimatePresence>
  );
}

function App() {
  const [activeView, setActiveView] = useState("overview");
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [device, setDevice] = useState(INITIAL_DEVICE);
  const [apiUrl, setApiUrl] = useState(localStorage.getItem("wfp_api_url") || DEFAULT_API_URL);
  const [refreshInterval] = useState(60);
  const [backgroundInterval] = useState(600);
  const [countdown, setCountdown] = useState(60);
  const [syncing, setSyncing] = useState(false);
  const [historyData, setHistoryData] = useState(null);
  const [automations, setAutomations] = useState([]);
  const [aiProfile, setAiProfile] = useState("balanced");
  const [aiContent, setAiContent] = useState(null);
  const [aiModal, setAiModal] = useState({ open: false, title: "", subtitle: "", loading: false });
  const [configStatus, setConfigStatus] = useState(null);
  const [clock, setClock] = useState(formatTime());
  const [rates, setRates] = useState({
    kwhRate: Number(localStorage.getItem("wfp_r") || 1.15),
    dailyHours: Number(localStorage.getItem("wfp_h") || 10)
  });
  const [forms, setForms] = useState({
    offMinutes: "45",
    onMinutes: "30",
    onMode: "cool",
    onTemp: "23",
    autoHora: "",
    autoAcao: "ligar",
    autoModo: "cool",
    autoTemp: "23",
    smartthingsToken: "",
    smartthingsDeviceId: "",
    deepseekApiKey: "",
    adminPin: "",
    newAdminPin: "",
    timerStatus: "Sem timer ativo"
  });
  const { toast, showToast } = useToast();
  const timerRef = useRef(null);
  const countdownRef = useRef(null);
  const timerPollerRef = useRef(null);
  const tempDebounceRef = useRef(null);
  const syncCounterRef = useRef(0);

  const viewMeta = useMemo(() => NAV_ITEMS.find((item) => item.id === activeView) || NAV_ITEMS[0], [activeView]);

  const costs = useMemo(() => {
    const watts = Number(device.potencia) || 0;
    const kw = watts / 1000;
    const hour = kw * (Number(rates.kwhRate) || 0);
    const day = hour * (Number(rates.dailyHours) || 0);
    return { hour, day, week: day * 7, month: day * 30 };
  }, [device.potencia, rates]);

  const costChartData = useMemo(() => ({
    labels: ["Hora", "Dia", "Semana", "Mes"],
    datasets: [{
      data: [costs.hour, costs.day, costs.week, costs.month],
      backgroundColor: [
        "rgba(34, 211, 238, 0.25)",
        "rgba(34, 211, 238, 0.4)",
        "rgba(34, 211, 238, 0.58)",
        "rgba(34, 211, 238, 0.85)"
      ],
      borderRadius: 18,
      borderSkipped: false
    }]
  }), [costs]);

  const historyChartData = useMemo(() => {
    if (!historyData?.labels) return { labels: [], datasets: [] };
    return {
      labels: historyData.labels,
      datasets: [
        {
          label: "Potencia (W)",
          data: historyData.watts,
          borderColor: "#22d3ee",
          backgroundColor: "rgba(34, 211, 238, 0.14)",
          borderWidth: 2.5,
          fill: true,
          pointRadius: 0,
          tension: 0.35,
          yAxisID: "y"
        },
        {
          label: "Temperatura (C)",
          data: historyData.temps,
          borderColor: "#60a5fa",
          borderWidth: 2,
          fill: false,
          pointRadius: 0,
          tension: 0.35,
          yAxisID: "y1"
        }
      ]
    };
  }, [historyData]);

  const historyOptions = useMemo(() => ({
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: "index", intersect: false },
    plugins: { legend: { labels: { color: "#cbd5e1", font: { family: "Space Grotesk" } } } },
    scales: {
      x: { ticks: { color: "#64748b", font: { family: "JetBrains Mono" } }, grid: { color: "rgba(255,255,255,0.05)" } },
      y: { type: "linear", display: true, position: "left", ticks: { color: "#22d3ee", font: { family: "JetBrains Mono" } }, grid: { color: "rgba(255,255,255,0.05)" }, beginAtZero: true },
      y1: { type: "linear", display: true, position: "right", ticks: { color: "#60a5fa", font: { family: "JetBrains Mono" } }, grid: { display: false } }
    }
  }), []);

  const costOptions = useMemo(() => ({
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { color: "#94a3b8", font: { family: "JetBrains Mono" } }, grid: { display: false } },
      y: { ticks: { color: "#94a3b8", font: { family: "JetBrains Mono" }, callback: (value) => `R$ ${Number(value).toFixed(2)}` }, grid: { color: "rgba(255,255,255,0.05)" } }
    }
  }), []);

  const apiRequest = useCallback(async (action, payload = {}, successMessage = null) => {
    const url = apiUrl.trim();
    if (!url || url === DEFAULT_API_URL) {
      showToast("Configure a URL do backend primeiro", "error");
      return null;
    }

    try {
      const response = await fetch(url, { method: "POST", body: JSON.stringify({ action, ...payload }) });
      const json = await response.json();
      if (!json.success) {
        showToast(`Erro: ${json.error || "Falha na API"}`, "error");
        return null;
      }
      if (successMessage) showToast(successMessage, "success");
      return json.data;
    } catch (error) {
      console.error(error);
      showToast("Sem conexao com a API", "error");
      return null;
    }
  }, [apiUrl, showToast]);

  const resetCountdown = useCallback((interval = refreshInterval) => {
    setCountdown(interval);
    if (countdownRef.current) window.clearInterval(countdownRef.current);
    countdownRef.current = window.setInterval(() => {
      setCountdown((prev) => (prev <= 1 ? interval : prev - 1));
    }, 1000);
  }, [refreshInterval]);

  const syncNow = useCallback(async ({ silent = false } = {}) => {
    if (!silent) setSyncing(true);
    const data = await apiRequest("sync");
    if (!data) {
      if (!silent) setSyncing(false);
      return;
    }

    setDevice((prev) => ({ ...prev, ...data }));
    setClock(formatTime());
    syncCounterRef.current += 1;
    if (syncCounterRef.current % 5 === 1) {
      const hist = await apiRequest("getHistory", { n: 48 });
      if (hist?.labels) setHistoryData(hist);
    }
    resetCountdown();
    if (!silent) {
      setSyncing(false);
      showToast("Sincronizacao concluida", "success");
    }
  }, [apiRequest, resetCountdown, showToast]);

  const loadHistory = useCallback(async () => {
    const data = await apiRequest("getHistory", { n: 48 });
    if (data?.labels) setHistoryData(data);
  }, [apiRequest]);

  const loadAutomations = useCallback(async () => {
    const data = await apiRequest("getAutos");
    setAutomations(Array.isArray(data) ? data : []);
  }, [apiRequest]);

  const loadConfigStatus = useCallback(async () => {
    const data = await apiRequest("getConfigStatus");
    if (data) setConfigStatus(data);
  }, [apiRequest]);

  const updateTimerStatus = useCallback(async () => {
    const data = await apiRequest("getTimerStatus");
    if (!data) return;
    setForms((prev) => ({ ...prev, timerStatus: data.active ? `Desliga em ${data.remaining} min` : "Sem timer ativo" }));
  }, [apiRequest]);

  const resetAutoSync = useCallback(() => {
    if (timerRef.current) window.clearInterval(timerRef.current);
    const interval = document.hidden ? backgroundInterval : refreshInterval;
    timerRef.current = window.setInterval(() => syncNow({ silent: true }), interval * 1000);
    resetCountdown(interval);
  }, [backgroundInterval, refreshInterval, resetCountdown, syncNow]);

  useEffect(() => {
    localStorage.setItem("wfp_r", rates.kwhRate);
    localStorage.setItem("wfp_h", rates.dailyHours);
  }, [rates]);

  useEffect(() => {
    localStorage.setItem("wfp_api_url", apiUrl);
  }, [apiUrl]);

  useEffect(() => {
    const visibilityHandler = () => resetAutoSync();
    document.addEventListener("visibilitychange", visibilityHandler);
    syncNow({ silent: true });
    loadHistory();
    loadAutomations();
    loadConfigStatus();
    updateTimerStatus();
    resetAutoSync();
    timerPollerRef.current = window.setInterval(updateTimerStatus, 15000);
    const clockTimer = window.setInterval(() => setClock(formatTime()), 30000);

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").catch(() => null);
    }

    return () => {
      document.removeEventListener("visibilitychange", visibilityHandler);
      if (timerRef.current) window.clearInterval(timerRef.current);
      if (countdownRef.current) window.clearInterval(countdownRef.current);
      if (timerPollerRef.current) window.clearInterval(timerPollerRef.current);
      if (clockTimer) window.clearInterval(clockTimer);
      if (tempDebounceRef.current) window.clearTimeout(tempDebounceRef.current);
    };
  }, [loadAutomations, loadConfigStatus, loadHistory, resetAutoSync, syncNow, updateTimerStatus]);

  const navigate = (id) => {
    setActiveView(id);
    setSidebarOpen(false);
  };

  const togglePower = async () => {
    const next = !device.power;
    setDevice((prev) => ({ ...prev, power: next }));
    const data = await apiRequest("setPower", { value: next ? "on" : "off" }, next ? "Ligando..." : "Desligando...");
    if (!data) {
      setDevice((prev) => ({ ...prev, power: !next }));
      return;
    }
    window.setTimeout(() => syncNow({ silent: true }), 1600);
  };

  const adjustTemp = (delta) => {
    setDevice((prev) => {
      const nextTemp = Math.max(16, Math.min(30, Number(prev.tempAlvo || 23) + delta));
      if (tempDebounceRef.current) window.clearTimeout(tempDebounceRef.current);
      tempDebounceRef.current = window.setTimeout(() => {
        apiRequest("setTemp", { value: nextTemp }, "Temperatura ajustada");
      }, 650);
      return { ...prev, tempAlvo: nextTemp };
    });
  };

  const updateSetting = async (action, value, message) => {
    const data = await apiRequest(action, { value }, message);
    if (data !== null) window.setTimeout(() => syncNow({ silent: true }), 1200);
  };

  const toggleFeature = async (feature) => {
    const current = {
      quiet: String(device.modoOpcional || "").toLowerCase() === "quiet",
      windFree: ["windfree", "wind_free"].includes(String(device.modoOpcional || "").toLowerCase()),
      autoClean: String(device.autoClean || "").toLowerCase() === "on"
    };
    const next = !current[feature];
    const actions = {
      quiet: ["setQuiet", next],
      windFree: ["setWindFree", next],
      autoClean: ["setAutoClean", next]
    };
    await apiRequest(actions[feature][0], { value: actions[feature][1] }, `${feature} ${next ? "ativado" : "desativado"}`);
    window.setTimeout(() => syncNow({ silent: true }), 1400);
  };

  const applyPreset = async (preset) => {
    await apiRequest("applyPreset", { value: preset }, "Preset ativado");
    window.setTimeout(() => syncNow({ silent: true }), 1800);
  };

  const saveTimer = async (type) => {
    if (type === "off") {
      const minutes = parseInt(forms.offMinutes, 10);
      if (!minutes || minutes < 1) return showToast("Informe os minutos do timer", "error");
      const data = await apiRequest("setOffTimer", { minutes }, "Timer de desligamento salvo");
      if (data) updateTimerStatus();
      return;
    }

    const minutes = parseInt(forms.onMinutes, 10);
    if (!minutes || minutes < 1) return showToast("Informe os minutos do ligamento", "error");
    await apiRequest("setOnTimer", {
      minutes,
      mode: forms.onMode,
      temp: parseInt(forms.onTemp, 10) || 23
    }, "Ligamento programado");
  };

  const addAutomation = async () => {
    if (!forms.autoHora) return showToast("Informe a hora da automacao", "error");
    const rule = {
      hora: forms.autoHora,
      acao: forms.autoAcao,
      modo: forms.autoModo,
      temp: parseInt(forms.autoTemp, 10) || 23,
      ativo: true
    };
    const data = await apiRequest("addAuto", { rule }, "Automacao adicionada");
    if (data !== null) {
      setForms((prev) => ({ ...prev, autoHora: "" }));
      loadAutomations();
    }
  };

  const deleteAutomation = async (id) => {
    const data = await apiRequest("delAuto", { id }, "Automacao removida");
    if (data !== null) loadAutomations();
  };

  const openAiModal = async (mode) => {
    const title = mode === "economia" ? "IA Economia" : "Perfil IA";
    const subtitle = mode === "economia"
      ? "Analisando consumo e oportunidades de economia."
      : "Montando seu perfil de uso para conforto e eficiencia.";

    setAiModal({ open: true, title, subtitle, loading: true });
    showToast(mode === "economia" ? "Consultando IA..." : "Analisando perfil...", "info");
    const action = mode === "economia" ? "reqOptimization" : "reqProfile";
    const data = await apiRequest(action);
    if (!data) {
      setAiModal((prev) => ({ ...prev, loading: false }));
      return;
    }

    setAiProfile(data.profile || "balanced");
    setAiContent({ mode, data });
    setAiModal((prev) => ({ ...prev, loading: false }));
  };

  const saveConfig = async () => {
    const data = await apiRequest("saveConfig", {
      smartthingsToken: forms.smartthingsToken,
      smartthingsDeviceId: forms.smartthingsDeviceId,
      deepseekApiKey: forms.deepseekApiKey,
      adminPin: forms.adminPin,
      newAdminPin: forms.newAdminPin
    }, "Configuracoes salvas");

    if (!data) return;
    setConfigStatus(data.status);
    setForms((prev) => ({
      ...prev,
      smartthingsToken: "",
      deepseekApiKey: "",
      adminPin: "",
      newAdminPin: ""
    }));
  };

  const clearApiKeys = async () => {
    const data = await apiRequest("clearConfig", {
      adminPin: forms.adminPin,
      clearSmartthings: true,
      clearDeepseek: true
    }, "Chaves removidas");
    if (data) setConfigStatus(data.status);
  };

  const renderView = () => {
    switch (activeView) {
      case "overview":
        return (
          <div className="space-y-5">
            <div className="grid gap-4 sm:grid-cols-2 xl:grid-cols-4">
              <StatCard label="Energia" value={`${device.energia ?? "--"} kWh`} hint="Total acumulado" accent />
              <StatCard label="Temperatura" value={`${device.temperatura ?? "--"}°C`} hint="Ambiente monitorado" />
              <StatCard label="Umidade" value={`${device.umidade ?? "--"}%`} hint="Leitura instantanea" />
              <StatCard label="Potencia" value={`${device.potencia ?? "--"} W`} hint="Consumo em tempo real" />
            </div>

            <div className="grid gap-5 xl:grid-cols-[1.4fr,0.9fr]">

        {aiModal.loading ? (
          <div className="rounded-3xl border border-white/10 bg-white/5 p-6">
            <div className="h-11 w-11 animate-spin rounded-full border-4 border-cyan-400/20 border-t-cyan-400"></div>
            <p className="mt-4 text-sm text-slate-300">Processando a analise inteligente...</p>
          </div>
        ) : aiContent ? (
          <div className="space-y-4 rounded-3xl border border-cyan-400/20 bg-cyan-400/10 p-5 text-sm leading-7 text-slate-200">
            <p className="text-xs uppercase tracking-[0.28em] text-cyan-200">Resultado</p>
            <p>{aiContent.mode === "economia" ? aiContent.data.advice : aiContent.data.insight}</p>
            {aiContent.mode === "economia" && aiContent.data.saving ? <p>Economia estimada: {aiContent.data.saving}</p> : null}
            {aiContent.mode === "perfil" && aiContent.data.suggestion ? <p>Sugestao: {aiContent.data.suggestion}</p> : null}
            {aiContent.data.presetRecommended ? <p>Preset recomendado: {aiContent.data.presetRecommended}</p> : null}
          </div>
        ) : (
          <div className="rounded-3xl border border-white/10 bg-white/5 p-5 text-sm text-slate-300">Nenhum resultado disponivel.</div>
        )}
      </Modal>

      <AnimatePresence>
        {toast ? (
          <motion.div initial={{ opacity: 0, y: 18 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: 18 }} className={cn("fixed bottom-5 left-1/2 z-50 w-[calc(100%-2rem)] max-w-md -translate-x-1/2 rounded-2xl border px-4 py-4 text-sm shadow-panel", toast.tone === "error" ? "border-red-400/20 bg-red-500/10 text-red-100" : toast.tone === "success" ? "border-cyan-400/20 bg-cyan-400/10 text-cyan-100" : "border-white/10 bg-white/10 text-white")}>
            {toast.message}
          </motion.div>
        ) : null}
      </AnimatePresence>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);



  </script>
</body>
</html>
